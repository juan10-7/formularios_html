<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos del estudiante</title>
</head>
<body>
    <!--Esta es la seccion visible de la pagina web-->
    <h1>REGISTRO DE ESTUDIANTES - ESPECIALIDAD EN SISTEMAS 2026</h1>
    <!--Formulario web-->
    <form action="#" method="">
        <!--Seccion de Datos del estudiante-->
        <fieldset>
            <legend>Datos del estudiante</legend>
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
            <br>
            <label for="fechanacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fechanacimiento" name="fechanacimiento">
            <label for="lugarnacimieento">Lugar de nacimiento:</label>
            <input type="text" id="lugarnacimieento" name="lugarnacimieento">
            <label for="Edad">Edad:</label>
            <input type="number" id="Edad" name="Edad">
            <br>
            <label for="tipodocumento">Tipo de documento de identidad:</label>
            <label> T.I: </label>
            <input type="radio" id="tipodocumento" name="tipodocumento">
            <label> C.C: </label>
            <input type="radio" id="tipodocumento" name="tipodocumento">
            <label for="numerodocumento">Número de documento de identidad</label>
            <input type="number" id="numerodocumento" name="numerodocumento">
            <br>
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion">
            <label for="barrio">Barrio:</label>
            <input type="text" id="barrio" name="barrio">
            <label for="ciudad">Ciudad:</label>
            <input type="text" id="ciudad" name="ciudad">
            <br>
            <label for="telefono">Teléfono:</label>
            <input type="number" id="telefono" name="telefono">
            <label for="celular"> Celular:</label>
            <input type="number" id="celular" name="celular">
            <br>
            <label for="correo">E-mail personal:</label>
            <input type="email" id="correo" name="correo">
            <label for="correoinst">E-mail inst</label>
            <input type="email" id="correoinst" name="correoinst">
            <br>
            <label for="tipodangre">Tipo de sangre:</label>
            <input type="text" id="tipodangre" name="tipodangre">
            <label for="eps">EPS:</label>
            <input type="text" id="eps" name="eps">
            <br>
            <label for="discapasidad">¿Sufre de alguna discapacidad?:</label>
            <label for="si">Si</label>
            <input type="radio" id="si" name="discapasidad">
            <label for="no">No</label>
            <input type="radio" id="no" name="discapasidad">
            <label for="cual">¿Cuál?</label>
            <input type="text" id="cual" name="cual">
            <br>
            <label for="estrato">Estrato socioeconómico:</label>
            <input type="number" id="estrato" name="estrato">
            <label for="familiasaccion">Familias en Accion</label>
            <label for="si">Si</label>
            <input type="radio" id="si" name="familiasaccion">
            <label for="no">No</label>
            <input type="radio" id="no" name="familiasaccion">
            <br>
            <label for="religion">Tipo de religion:</label>
            <input type="text" id="religion" name="religion">
            <br>
            <label for="relacionpadres">Relacion padres:</label>
            <label for="casados">Casados:</label>
            <input type="radio" id="casados" name="relacionpadres">
            <label for="separados">Separados:</label>
            <input type="radio" id="separados" name="relacionpadres">
            <label for="unionlibre">Unión Libre:</label>
            <input type="radio" id="unionlibre" name="relacionpadres">
            <label for="otro">Otro:</label>
            <input type="text" id="otro" name="relacionpadres">
            <br>
            <br>
            <label for="computadora">¿Computadora en casa?:</label>
            <label for="si">Si</label>
            <input type="radio" id="si" name="computadora">
            <label for="no">No</label>
            <input type="radio" id="no" name="computadora">
            <label for="internet">Internet en casa:</label>
            <label for="si">Si</label>
            <input type="radio" id="si" name="internet">
            <label for="no">No</label>
            <input type="radio" id="no" name="internet">
            <br>
            <br>
            <label for="hobby">¿Cuales son las principales actividades que usted realiza en su tiempo libre?:</label>
            <br>
            <textarea id="hobby" name="hobby"></textarea>
            <br>
            <label for="expectativas">¿Cuales son sus propositos y expectativas personales y academicas como estudiante de la especialidad en sistemas?:</label>
            <br>
            <textarea id="expectativas" name="expectativas"></textarea>
        </fieldset>
        <fieldset>
            <legend>Datos del Padre</legend>
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
            <br>
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion">
            <label for="barrio">Barrio:</label>
            <input type="text" id="barrio" name="barrio">
            <br>
            <label for="telefono">Teléfono:</label>
            <input type="number" id="telefono" name="telefono">
            <label for="celular">Celular:</label>
            <input type="number" id="celular" name="celular">
            <br>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">
            <br>
            <label for="ocupacion">Ocupacion:</label>
            <input type="text" id="ocupacion" name="ocupacion">
        </fieldset>
<fieldset>
            <legend>Datos de la Madre</legend>
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
            <br>
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion">
            <label for="barrio">Barrio:</label>
            <input type="text" id="barrio" name="barrio">
            <br>
            <label for="telefono">Teléfono:</label>
            <input type="number" id="telefono" name="telefono">
            <label for="celular">Celular:</label>
            <input type="number" id="celular" name="celular">
            <br>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">
            <br>
            <label for="ocupacion">Ocupacion:</label>
            <input type="text" id="ocupacion" name="ocupacion">
        </fieldset>
        <fieldset>
            <legend>Datos del Acudiente</legend>
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
            <label for="parentesco">Parentesco:</label>
            <input type="text" id="parentesco" name="parentesco">
            <br>
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion">
            <label for="barrio">Barrio:</label>
            <input type="text" id="barrio" name="barrio">
            <br>
            <label for="telefono">Teléfono:</label>
            <input type="number" id="telefono" name="telefono">
            <label for="celular">Celular:</label>
            <input type="number" id="celular" name="celular">
            <br>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">
            <br>
            <label for="ocupacion">Ocupacion:</label>
            <input type="text" id="ocupacion" name="ocupacion">
        </fieldset>
        <br>
        <button type="submit">Enviar Formulario</button>
        <button type="reset">Limpiar Datos</button>

    </form>
    <h3>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos del estudiante</title>
</head>
<body>
    <!--Esta es la seccion visible de la pagina web-->
    <h1>REGISTRO DE ESTUDIANTES</h1>
    <!--Formulario web-->
    <form action="#" method="">
        <!--Seccion de Datos del estudiante-->
        <fieldset>
            <legend>Datos del estudiante</legend>
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
            <br>
            <label for="grado">Grado:</label>
            <input type="text" id="grado" name="grado">
            <label for="correo institucional">Correo institucional:</label>
            <input type="email" id="correo institucional" name="correo institucional">
            <br>
            <label for="telefono">Teléfono:</label>
            <input type="number" id="telefono" name="telefono">
            <label for="edad"> Edad:</label>
            <input type="number" id="edad" name="edad">
            <br>
            <label for="expectativas">¿cual son tus expectativas?:</label>
            <br>
            <textarea id="expectativas" name="expectativas"></textarea>
            <br>
            <label for="tipodocumento">Tipo de documento de identidad:</label>
            <label> T.I: </label>
            <input type="radio" id="tipodocumento" name="tipodocumento">
            <label> C.C: </label>
            <br>
            </fieldset>
        <br>
        <button type="submit">Enviar Formulario</button>
        <button type="reset">Limpiar Datos</button>

    </form>
    <h3>
</body>
</html>
